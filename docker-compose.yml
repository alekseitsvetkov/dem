services:
  nats:
    image: nats:2.12-alpine
    command: ["-js", "-m", "8222", "--name", "dem-nats"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dem
      POSTGRES_PASSWORD: dem
      POSTGRES_DB: dem
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dem -d dem"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER: "on"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    command: redis-server --appendonly yes

  migrate:
    build: .
    command: sh -c "migrate -database 'postgres://dem:dem@postgres:5432/dem?sslmode=disable' -path /sql/migrations up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  poller:
    build: .
    command: /usr/local/bin/poller
    environment:
      DEM_NATS_URL: nats://nats:4222
      DEM_DATABASE_URL: postgres://dem:dem@postgres:5432/dem?sslmode=disable
      DEM_POLLER_ONESHOT: "true"
      DEM_POLLER_MIN_INTERVAL: 0s
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  downloader:
    build: .
    command: /usr/local/bin/downloader
    network_mode: host
    environment:
      DEM_NATS_URL: nats://localhost:4222
      DEM_MINIO_ENDPOINT: localhost:9000
      DEM_MINIO_ACCESS_KEY: minioadmin
      DEM_MINIO_SECRET_KEY: minioadmin
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  parser:
    build: .
    command: /usr/local/bin/parser
    environment:
      DEM_NATS_URL: nats://nats:4222
      DEM_DATABASE_URL: postgres://dem:dem@postgres:5432/dem?sslmode=disable
      DEM_MINIO_ENDPOINT: minio:9000
      DEM_MINIO_ACCESS_KEY: minioadmin
      DEM_MINIO_SECRET_KEY: minioadmin
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  redisdata:
